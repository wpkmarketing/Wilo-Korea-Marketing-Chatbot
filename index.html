<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wilo Korea Chatbot</title>
    <style>
        :root { --wilo-green: #009c82; --wilo-bg: #f8fafb; --wilo-light: #e1f5f1; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; background: #e9ecef; display: flex; justify-content: center; height: 100vh; }
        
        /* 전체 컨테이너 (화면 크게) */
        #chat-container { width: 100%; max-width: 600px; height: 100vh; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* 상단 헤더: 요청하신 문구 적용 */
        #header { background: var(--wilo-green); color: white; padding: 20px; text-align: center; }
        #header h1 { margin: 0; font-size: 1.25rem; font-weight: 700; }
        #header p { margin: 8px 0 0; font-size: 0.85rem; opacity: 0.9; }
        
        /* 안내 문구 (카테고리 위) */
        .guide-text { background: #fff; padding: 12px; text-align: center; font-size: 0.8rem; color: #666; border-bottom: 1px solid #f1f1f1; }

        /* 메시지 영역 */
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: var(--wilo-bg); display: flex; flex-direction: column; gap: 15px; }
        .msg-group { display: flex; flex-direction: column; gap: 5px; max-width: 85%; }
        .bot-group { align-self: flex-start; }
        .user-group { align-self: flex-end; }
        
        .profile-name { font-size: 0.75rem; color: #333; font-weight: 600; margin-bottom: 2px; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .bot { background: white; color: #222; border-top-left-radius: 2px; border: 1px solid #eee; }
        .user { background: var(--wilo-green); color: white; border-top-right-radius: 2px; }
        .time { font-size: 0.7rem; color: #999; margin-top: 2px; }
        .user-group .time { text-align: right; }

        /* 카테고리 & FAQ 영역 (SCM봇 스타일) */
        .info-section { background: white; padding: 15px 20px; border-top: 1px solid #eee; }
        .section-title { font-size: 0.85rem; font-weight: 700; color: #333; margin-bottom: 12px; display: block; }
        
        .cat-list { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .cat-item { padding: 6px 14px; border-radius: 20px; background: #f1f3f5; font-size: 0.8rem; color: #495057; border: none; cursor: pointer; }
        .cat-item.active { background: var(--wilo-green); color: white; }

        .faq-list { display: flex; flex-direction: column; gap: 8px; }
        .faq-link { padding: 12px 15px; background: #f8f9fa; border-radius: 10px; font-size: 0.85rem; color: #333; text-decoration: none; border: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .faq-link:hover { background: var(--wilo-light); border-color: var(--wilo-green); }

        /* 입력창 */
        #input-area { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; border: 1px solid #eee; padding: 12px 18px; border-radius: 25px; outline: none; background: #f8f9fa; font-size: 0.9rem; }
        #send-btn { background: var(--wilo-green); border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="header">
            <h1>윌로펌프 챗봇</h1>
            <p>문의 내용을 입력하시면 등록된 답변을 안내드립니다.</p>
        </div>

        <div class="guide-text">아래 카테고리를 선택하면 해당 FAQ가 아래 표시됩니다.</div>

        <div id="messages">
            <div class="msg-group bot-group">
                <span class="profile-name">윌로펌프 챗봇</span>
                <div class="msg bot">
                    안녕하세요.<br>문의사항을 입력하거나 아래 FAQ를 선택해주세요.
                </div>
                <span class="time" id="start-time"></span>
            </div>
        </div>

        <div class="info-section">
            <span class="section-title">카테고리</span>
            <div class="cat-list">
                <button class="cat-item active">전체</button>
                <button class="cat-item">제품</button>
                <button class="cat-item">대리점</button>
                <button class="cat-item">A/S</button>
                <button class="cat-item">기타</button>
            </div>

            <span class="section-title">자주 묻는 질문</span>
            <div class="faq-list">
                <div class="faq-link" onclick="handleFaq('서비스 센터 연락처')">💧 서비스 센터 연락처가 어떻게 되나요?</div>
                <div class="faq-link" onclick="handleFaq('제품 구매처')">🏠 제품은 어디서 구매할 수 있나요?</div>
                <div class="faq-link" onclick="handleFaq('카탈로그 다운로드')">📄 카탈로그나 도면은 어디서 받나요?</div>
            </div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="질문을 입력하세요" onkeypress="if(event.keyCode==13) send()">
            <button id="send-btn" onclick="send()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        // 현재 시간 표시
        function updateTime() {
            const now = new Date();
            const timeStr = (now.getHours() >= 12 ? '오후 ' : '오전 ') + (now.getHours() % 12 || 12) + ':' + now.getMinutes().toString().padStart(2, '0');
            return timeStr;
        }
        document.getElementById('start-time').innerText = updateTime();

        // FAQ 클릭 처리
        function handleFaq(text) {
            document.getElementById('user-input').value = text;
            send();
        }

        async function send() {
            const input = document.getElementById('user-input');
            const msgDiv = document.getElementById('messages');
            if(!input.value) return;

            const userText = input.value;
            msgDiv.innerHTML += `
                <div class="msg-group user-group">
                    <div class="msg user">${userText}</div>
                    <span class="time">${updateTime()}</span>
                </div>`;
            input.value = '';
            msgDiv.scrollTop = msgDiv.scrollHeight;

            try {
                const response = await fetch('faq.json');
                const faqs = await response.json();
                let answer = "문의하신 내용에 대한 답변을 찾지 못했습니다. 고객센터(1688-5890)로 연락 주시면 상세히 안내해 드리겠습니다.";

                faqs.forEach(item => {
                    if(userText.includes(item.question.substring(0, 3)) || item.tags.some(tag => userText.includes(tag))) {
                        answer = item.answer;
                    }
                });

                setTimeout(() => {
                    msgDiv.innerHTML += `
                        <div class="msg-group bot-group">
                            <span class="profile-name">윌로펌프 챗봇</span>
                            <div class="msg bot">${answer}</div>
                            <span class="time">${updateTime()}</span>
                        </div>`;
                    msgDiv.scrollTop = msgDiv.scrollHeight;
                }, 500);
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
