<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wilo Korea AI Chatbot</title>
    <style>
        :root { --wilo-green: #009c82; --wilo-bg: #f2f4f7; --radius-main: 28px; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #dee2e6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* 챗봇 컨테이너 */
        #chat-container { width: 90%; max-width: 500px; height: 85vh; background: white; display: flex; flex-direction: column; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-radius: var(--radius-main); overflow: hidden; position: relative; }
        
        /* 헤더 */
        #header { background: var(--wilo-green); color: white; padding: 20px; text-align: center; }
        #header h1 { margin: 0; font-size: 1.1rem; }
        #header p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.8; }

        /* 메시지 창 */
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: var(--wilo-bg); display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; line-height: 1.5; max-width: 85%; }
        .bot { background: white; align-self: flex-start; border-top-left-radius: 4px; border: 1px solid #eee; }
        .user { background: var(--wilo-green); color: white; align-self: flex-end; border-top-right-radius: 4px; }

        /* [핵심] 문의 폼 레이어 (평소엔 숨김) */
        #inquiry-form { 
            position: absolute; bottom: 0; left: 0; right: 0; background: white; 
            padding: 25px; border-top-left-radius: var(--radius-main); border-top-right-radius: var(--radius-main);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1); display: none; z-index: 100;
        }
        #inquiry-form h3 { margin-top: 0; font-size: 1rem; color: var(--wilo-green); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.75rem; color: #666; margin-bottom: 4px; }
        .form-group input { width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: var(--wilo-green); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.2rem; color: #ccc; }

        /* 하단 입력바 */
        #input-area { padding: 15px 20px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
        input[type="text"] { flex: 1; border: 1px solid #eee; padding: 12px 18px; border-radius: 30px; outline: none; background: #f1f3f5; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="header">
            <h1>윌로펌프 AI 커넥트</h1>
            <p>제품 구매 및 기술 문의를 도와드립니다.</p>
        </div>

        <div id="messages">
            <div class="msg bot">안녕하세요! 윌로펌프 AI 챗봇입니다. 제품 정보나 구매/AS 문의를 입력해주세요.</div>
        </div>

        <div id="inquiry-form">
            <span class="close-btn" onclick="toggleForm(false)">×</span>
            <h3>전문가 상담 신청</h3>
            <p style="font-size: 0.75rem; color: #888; margin-bottom: 15px;">세부 기술 사항 확인을 위해 연락처를 남겨주세요.</p>
            <div class="form-group"><label>성함</label><input type="text" id="form-name" placeholder="이름을 입력하세요"></div>
            <div class="form-group"><label>연락처</label><input type="text" id="form-tel" placeholder="010-0000-0000"></div>
            <div class="form-group"><label>이메일</label><input type="text" id="form-email" placeholder="email@wilo.com"></div>
            <div class="form-group"><label>거주 도시</label><input type="text" id="form-city" placeholder="예: 서울시 강서구"></div>
            <button class="submit-btn" onclick="submitInquiry()">상담 신청하기</button>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="질문을 입력하세요..." onkeypress="if(event.keyCode==13) send()">
        </div>
    </div>

    <script>
        function toggleForm(show) {
            document.getElementById('inquiry-form').style.display = show ? 'block' : 'none';
        }

        async function send() {
            const input = document.getElementById('user-input');
            const msgDiv = document.getElementById('messages');
            if(!input.value) return;

            const userText = input.value;
            msgDiv.innerHTML += `<div class="msg user">${userText}</div>`;
            input.value = '';
            msgDiv.scrollTop = msgDiv.scrollHeight;

            // '구매', 'AS', '상담' 등 키워드 감지 시 폼 띄우기
            if(userText.includes('구매') || userText.includes('AS') || userText.includes('에이에스') || userText.includes('신청')) {
                setTimeout(() => {
                    msgDiv.innerHTML += `<div class="msg bot">정확한 상담을 위해 전문 담당자에게 연결해 드릴까요? 아래 양식을 작성해주시면 신속히 연락드리겠습니다.</div>`;
                    msgDiv.scrollTop = msgDiv.scrollHeight;
                    toggleForm(true); // 폼 등장!
                }, 500);
            } else {
                // 일반 질문은 기존 FAQ 로직 수행 (여기에 AI API를 연결하면 인터넷 기반 답변이 됩니다)
                setTimeout(() => {
                    msgDiv.innerHTML += `<div class="msg bot">인터넷 정보를 확인 중입니다... 상세 기술 문의는 '상담 신청'을 입력해주세요.</div>`;
                    msgDiv.scrollTop = msgDiv.scrollHeight;
                }, 500);
            }
        }

        function submitInquiry() {
            const name = document.getElementById('form-name').value;
            const city = document.getElementById('form-city').value;
            
            if(!name || !city) {
                alert('성함과 도시는 필수 입력 항목입니다.');
                return;
            }

            alert(`${name}님, 문의가 접수되었습니다. ${city} 담당자에게 내용을 전달하겠습니다!`);
            toggleForm(false);
            
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML += `<div class="msg bot">상담 신청이 완료되었습니다. 확인 후 담당자가 연락드리겠습니다.</div>`;
        }
    </script>
</body>
</html>
